<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空間シェイクアウト | Quake Interactive Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Biz+UDPGOthic:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    
    <style>
        .shakeout-container { max-width: 800px; margin: 100px auto 2rem; text-align: center; }
        
        .simulation-window { background: #111; border: 2px solid #333; border-radius: 8px; height: 400px; position: relative; overflow: hidden; margin-bottom: 2rem; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* 揺れのエフェクト */
        @keyframes earthquake {
            0% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-5px, -5px) rotate(-1deg); }
            20% { transform: translate(5px, 5px) rotate(1deg); }
            30% { transform: translate(-5px, 5px) rotate(0deg); }
            40% { transform: translate(5px, -5px) rotate(1deg); }
            50% { transform: translate(-5px, 0) rotate(-1deg); }
            60% { transform: translate(5px, 0) rotate(0deg); }
            70% { transform: translate(0, 5px) rotate(-1deg); }
            80% { transform: translate(0, -5px) rotate(1deg); }
            90% { transform: translate(-5px, 5px) rotate(0deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .shaking { animation: earthquake 0.3s infinite; border-color: var(--cud-orange); }
        
        /* タイマー表示 */
        .timer-display { font-family: var(--font-mono); font-size: 3rem; color: #fff; z-index: 10; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        
        /* アクションボタン */
        .action-area { padding: 2rem; background: var(--surface-color); border-radius: 8px; border: 1px solid var(--border-color); }
        #btn-action { background: #00E676; color: #000; border: none; font-size: 1.5rem; font-weight: bold; padding: 20px 40px; border-radius: 50px; cursor: pointer; transition: 0.1s; box-shadow: 0 0 20px rgba(0, 230, 118, 0.4); }
        #btn-action:active { transform: scale(0.95); background: #00c853; }
        #btn-action:disabled { background: #333; color: #666; box-shadow: none; cursor: not-allowed; }
        
        .instruction { color: #aaa; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <span class="tag" style="background: #F0E442; color: #000; font-weight: bold; margin-bottom: 4px; display: inline-block;">Physical Training</span>
            <h1 style="font-size: 1rem; margin: 0; letter-spacing: 0.1em;">空間シェイクアウト</h1>
        </div>
        <div class="header-actions">
            <a href="index.html" class="btn-back" data-log="シェイクアウト：戻るボタンをクリック">✕ 戻る</a>
        </div>
    </header>

    <main class="shakeout-container">
        
        <div id="start-screen">
            <h2 style="color: #fff; margin-bottom: 1rem;">緊急地震速報、受信。</h2>
            <p style="color: #aaa; margin-bottom: 2rem;">揺れが来るまでに安全な姿勢（DROP, COVER, HOLD ON）をとってください。<br>揺れが収まるまで、下のボタンを「長押し」して身を守り続けてください。</p>
            <button class="btn primary" id="btn-start" style="font-size: 1.2rem; padding: 15px 30px;" data-log="シェイクアウト：訓練を開始するボタンをクリック">訓練を開始する</button>
        </div>

        <div id="training-screen" style="display: none;">
            <div class="simulation-window" id="sim-window">
                <div id="status-text" style="color: var(--cud-orange); font-weight: bold; font-size: 1.5rem; margin-bottom: 10px;">地震発生！身を守れ！</div>
                <div class="timer-display" id="timer">10.0</div>
            </div>
            
            <div class="action-area">
                <button id="btn-action" data-log="シェイクアウト：アクションボタンをクリック">長押しして身を守る</button>
                <div class="instruction">※ マウスの左ボタンを押し続けてください</div>
            </div>
        </div>

        <div id="result-screen" style="display: none; padding: 3rem; background: var(--surface-color); border-radius: 8px; border: 1px solid var(--border-color);">
            <h2 id="result-title" style="font-size: 2rem; margin-bottom: 10px;"></h2>
            <p id="result-desc" style="color: #aaa; margin-bottom: 2rem; line-height: 1.6;"></p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <a href="index.html" class="btn secondary" data-log="シェイクアウト：ダッシュボードへ戻るリンクをクリック">ダッシュボードへ戻る</a>
                <button class="btn primary" id="btn-retry" data-log="シェイクアウト：もう一度挑戦するボタンをクリック">もう一度挑戦する</button>
            </div>
        </div>

    </main>

    <script src="./js/logger.js"></script>
    <script src="./js/shakeout.js"></script>
</body>
</html>
