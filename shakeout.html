<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瞬時の意思決定：DCHサバイバル | Quake Interactive Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Biz+UDPGOthic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100dvh; background-color: #0a0a0a; color: #fff; font-family: 'Biz UDPGOthic', sans-serif; overflow: hidden; }
        .header { padding: 1rem 2rem; background: #111; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; z-index: 100; position: relative; }
        
        .main-container { display: flex; flex-direction: column; justify-content: center; align-items: center; height: calc(100vh - 60px); position: relative; transition: background 0.3s; }
        .bg-alert { background: radial-gradient(circle at center, #310000 0%, #0a0000 100%); animation: pulseRed 1s infinite alternate; }
        @keyframes pulseRed { 0% { background-color: #0a0a0a; } 100% { background-color: #220000; } }

        .content-box { text-align: center; max-width: 800px; width: 90%; z-index: 10; padding: 2rem; background: rgba(20, 20, 20, 0.9); border: 1px solid #444; border-radius: 8px; backdrop-filter: blur(5px); }
        
        .timer-container { width: 100%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; margin-bottom: 1.5rem; display: none; }
        .timer-bar { height: 100%; width: 100%; background: #FF2800; transform-origin: left; transition: transform 0.1s linear; }

        .scene-title { font-size: 1.5rem; color: #56B4E9; margin-bottom: 0.5rem; }
        .situation-text { font-size: 1.4rem; font-weight: bold; line-height: 1.6; margin-bottom: 2rem; color: #fff; }
        .alert-text { color: #FFBE00; font-size: 1.6rem; animation: flashText 0.5s infinite alternate; }
        @keyframes flashText { from { opacity: 0.7; } to { opacity: 1; } }

        .choices-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        .btn-choice { background: #1a1a1a; border: 2px solid #555; color: #fff; padding: 1.5rem 1rem; font-size: 1.1rem; border-radius: 8px; cursor: pointer; transition: all 0.1s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; font-family: inherit; }
        .btn-choice:hover { border-color: #56B4E9; background: #222; transform: translateY(-3px); }
        .choice-icon { font-size: 2.5rem; }

        /* 長押しバグを解消する最強のCSS設定 */
        .btn-hold { 
            background: #8B0000; border: 4px solid #FF2800; color: #fff; width: 200px; height: 200px; border-radius: 50%; 
            font-size: 1.5rem; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; margin: 0 auto; transition: transform 0.1s;
            touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; /* ←これが必須 */
        }
        .btn-hold:active { transform: scale(0.95); background: #FF2800; }
        .btn-hold.holding { border-color: #00FF00; background: #008B00; }

        .feedback-box { text-align: left; padding: 1.5rem; border-radius: 8px; border-left: 5px solid; background: #111; margin-bottom: 1.5rem; }
        .feedback-correct { border-color: #00B400; }
        .feedback-incorrect { border-color: #FF2800; }
    </style>
</head>
<body>
    <header class="header">
        <h1 style="font-size: 1.1rem; margin: 0; color: #aaa;">瞬時の意思決定：DCHサバイバル</h1>
        <a href="index.html" class="btn secondary btn-small" style="border-color: #555; color: #ccc;">✕ 中断して戻る</a>
    </header>

    <main class="main-container" id="main-container">
        <div class="content-box" id="content-box"></div>
    </main>

    <script src="./js/shakeout.js"></script>
</body>
</html>
