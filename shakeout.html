<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCH サバイバル | Quake Interactive Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Biz+UDPGOthic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100dvh; background-color: #000; color: #fff; font-family: 'Biz UDPGOthic', sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { padding: 1rem 2rem; background: rgba(10, 10, 10, 0.95); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; flex-shrink: 0; z-index: 10; position: relative; }
        
        .main-content { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; background-color: #050505; }
        
        /* メニュー画面 */
        .menu-screen { position: absolute; z-index: 100; display: flex; flex-direction: column; gap: 2rem; background: rgba(0, 0, 0, 0.85); padding: 3rem; border-radius: 12px; border: 1px solid #444; text-align: center; backdrop-filter: blur(10px); }
        .scene-card { background: #1a1a1a; border: 1px solid #555; padding: 2rem; border-radius: 8px; cursor: pointer; transition: all 0.2s; width: 320px; box-sizing: border-box; }
        .scene-card:hover { border-color: #FFBE00; background: #2a2a2a; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255,190,0,0.2); }
        .scene-icon { font-size: 3.5rem; margin-bottom: 1rem; }
        .scene-title { font-size: 1.4rem; font-weight: bold; color: #FFBE00; margin-bottom: 0.5rem; }
        .scene-desc { font-size: 0.9rem; color: #ccc; line-height: 1.5; }

        /* Canvasコンテナ */
        #game-canvas { background-color: #000; box-shadow: 0 0 40px rgba(0,0,0,1); cursor: crosshair; touch-action: none; display: none; max-width: 100%; max-height: 100%; object-fit: contain; }
        
        /* UIオーバーレイ */
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 10; flex-direction: column; align-items: center; }
        .alert-bar { width: 100%; background: rgba(255, 40, 0, 0.8); color: #fff; text-align: center; padding: 0.5rem; font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); animation: flash 0.5s infinite alternate; }
        @keyframes flash { from { opacity: 0.8; } to { opacity: 1; } }
        
        .timer-container { width: 80%; max-width: 600px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 5px; margin-top: 1rem; overflow: hidden; }
        .timer-bar { height: 100%; width: 100%; background: #FFBE00; transform-origin: left; transition: transform 0.1s linear; }

        /* リザルト画面 */
        .result-screen { position: absolute; z-index: 200; display: none; flex-direction: column; align-items: center; background: rgba(10, 10, 15, 0.95); padding: 3rem; border: 1px solid #555; border-radius: 12px; text-align: center; max-width: 600px; backdrop-filter: blur(10px); }
        .result-title { font-size: 2.5rem; margin-bottom: 1rem; font-weight: bold; }
        .result-desc { font-size: 1rem; line-height: 1.8; color: #eee; text-align: left; background: #111; padding: 1.5rem; border-left: 5px solid #FFBE00; margin-bottom: 2rem; }
    </style>
</head>
<body>

    <header class="header">
        <h1 style="font-size: 1.2rem; margin: 0; color: #ccc;">DCH サバイバル</h1>
        <a href="index.html" class="btn secondary btn-small" style="border-color: #555; color: #aaa;">✕ ダッシュボードへ戻る</a>
    </header>

    <main class="main-content" id="main-container">
        
        <div class="menu-screen" id="menu-screen">
            <h2 style="margin-top: 0; color: #fff;">シミュレーション環境の選択</h2>
            <div style="display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap;">
                <div class="scene-card" onclick="startScene('sleep')">
                    <div class="scene-icon">🛏️</div>
                    <div class="scene-title">就寝中（マイ・ルーム・マッピング）</div>
                    <div class="scene-desc">自室の家具配置を再現。もしあの家具が倒れてきたら、あなたはどう動くか？ 究極の自分事シミュレーション。</div>
                </div>
                <div class="scene-card" onclick="startScene('arena')">
                    <div class="scene-icon">🏟️</div>
                    <div class="scene-title">ライブ会場（アリーナ）</div>
                    <div class="scene-desc">暗転した巨大空間。群衆パニック（同調圧力）の濁流に抗い、その場に留まる勇気を試すサバイバル。</div>
                </div>
            </div>
        </div>

        <div class="ui-overlay" id="ui-overlay">
            <div class="alert-bar" id="alert-bar"></div>
            <div class="timer-container"><div class="timer-bar" id="timer-bar"></div></div>
        </div>

        <canvas id="game-canvas" width="800" height="600"></canvas>

        <div class="result-screen" id="result-screen">
            <div class="result-title" id="result-title"></div>
            <div class="result-desc" id="result-desc"></div>
            <div id="medal-notification" style="margin-bottom: 2rem;"></div>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button class="btn secondary" onclick="location.reload()">シーン選択へ戻る</button>
                <a href="index.html" class="btn primary">ダッシュボードへ帰還</a>
            </div>
        </div>

    </main>

    <script src="./js/shakeout.js"></script>
</body>
</html>
