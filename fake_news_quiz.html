<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情報見極め訓練 | Quake Interactive Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Biz+UDPGOthic:wght@400;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        body { background-color: #0a0a14; min-height: 100dvh; display: flex; flex-direction: column; color: #fff; }
        .quiz-header { padding: 1rem 2rem; background: #1a1a2e; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        
        .quiz-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 2rem; max-width: 800px; margin: 0 auto; width: 100%; }
        
        /* 緊迫感のある紫のアクセントカラー */
        .stage-indicator { font-family: var(--font-mono); color: #b366ff; font-weight: bold; margin-bottom: 1rem; font-size: 1.2rem; text-align: center; }
        
        .quiz-card { background: #1a1a2e; padding: 2.5rem 2rem; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; text-align: center; border: 1px solid #444; }
        
        /* 問題文は「SNSの投稿を見ている」ような枠で囲む */
        .sns-mockup { background: #000; border: 1px solid #333; border-radius: 8px; padding: 1.5rem; text-align: left; margin-bottom: 2rem; position: relative; }
        .sns-mockup::before { content: "📱 状況・情報"; position: absolute; top: -12px; left: 15px; background: #b366ff; color: #fff; font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .quiz-question { font-size: 1.2rem; line-height: 1.6; color: #ddd; font-weight: bold; }
        
        .timer-container { width: 100%; background: #000; height: 8px; border-radius: 4px; margin-bottom: 0.5rem; overflow: hidden; }
        .timer-bar { height: 100%; width: 100%; background: #009E73; transition: width 0.1s linear, background-color 0.3s; }
        .timer-text { text-align: right; font-family: var(--font-mono); font-size: 0.9rem; margin-bottom: 1.5rem; color: #888; font-weight: bold; }

        .btn-group { display: flex; gap: 1rem; justify-content: center; }
        .btn-ans { flex: 1; padding: 1.5rem; font-size: 1.5rem; border-radius: 6px; border: 2px solid; cursor: pointer; transition: 0.2s; background: transparent; font-weight: bold; }
        .btn-ans.maru { color: #0072B2; border-color: #0072B2; }
        .btn-ans.maru:hover { background: rgba(0, 114, 178, 0.2); }
        .btn-ans.batsu { color: #D55E00; border-color: #D55E00; }
        .btn-ans.batsu:hover { background: rgba(213, 94, 0, 0.2); }

        .explanation-area { display: none; margin-top: 2rem; text-align: left; padding-top: 1.5rem; border-top: 1px dashed #444; }
        .result-mark { font-size: 2.5rem; font-weight: bold; text-align: center; margin-bottom: 1rem; }
        .result-correct { color: #0072B2; }
        .result-incorrect { color: #D55E00; }
        .btn-next { width: 100%; margin-top: 1.5rem; padding: 1rem; font-size: 1.1rem; background: #b366ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .btn-next:hover { background: #9933ff; }

        /* リザルト画面 */
        .result-screen { display: none; width: 100%; }
        .score-board { background: #1a1a2e; padding: 2rem; border-radius: 8px; text-align: center; border: 1px solid #444; margin-bottom: 2rem; }
        .score-text { font-size: 3rem; font-family: var(--font-mono); font-weight: bold; color: #b366ff; margin: 1rem 0; }
        .medal-icon { font-size: 4rem; margin-bottom: 0.5rem; filter: drop-shadow(0 0 10px rgba(179,102,255,0.5)); }
        
        .review-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
        .review-item { background: #1a1a2e; padding: 1.5rem; border-radius: 8px; border: 1px solid #444; text-align: left; }
        .review-q { font-weight: bold; font-size: 1.05rem; margin-bottom: 1rem; color: #ddd; line-height: 1.5;}
        .review-ans { display: inline-block; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; margin-bottom: 0.5rem; }
        .review-ans.correct { background: rgba(0, 114, 178, 0.2); color: #56B4E9; }
        .review-ans.incorrect { background: rgba(213, 94, 0, 0.2); color: #E69F00; }
        .review-exp { font-size: 0.9rem; color: #bbb; line-height: 1.5; }
    </style>
</head>
<body>

    <header class="quiz-header">
        <h1 style="font-size: 1.2rem; margin: 0;">デマ・誤情報 見極め訓練</h1>
        <a href="index.html" class="btn secondary btn-small" style="color: #ccc; border-color: #666;">✕ やめる</a>
    </header>

    <main class="quiz-container">
        <div id="play-screen" style="width: 100%;">
            <div class="stage-indicator" id="stage-text">Loading...</div>
            <div class="quiz-card">
                <div class="timer-container">
                    <div id="timer-bar" class="timer-bar"></div>
                </div>
                <div id="timer-text" class="timer-text">残り: 10.0秒</div>

                <div class="sns-mockup">
                    <div class="quiz-question" id="question-text">データを読み込み中...</div>
                </div>
                
                <p style="font-size: 0.85rem; color: #888; margin-bottom: 10px;">この判断・行動は正しい？</p>
                <div class="btn-group" id="answer-buttons">
                    <button class="btn-ans maru" onclick="checkAnswer(true)">〇 (正しい)</button>
                    <button class="btn-ans batsu" onclick="checkAnswer(false)">✖ (間違っている)</button>
                </div>

                <div class="explanation-area" id="explanation-area">
                    <div class="result-mark" id="result-mark"></div>
                    <h4 style="margin: 0 0 0.5rem 0; color: #fff;">解説（ファクトチェック）</h4>
                    <p id="explanation-text" style="color: #ccc; line-height: 1.5; font-size: 0.95rem;"></p>
                    <button class="btn-next" onclick="nextQuestion()">次の情報へ</button>
                </div>
            </div>
        </div>

        <div id="result-screen" class="result-screen">
            <div class="score-board">
                <h2 style="color: #fff; margin:0;">情報見極め結果</h2>
                <div class="score-text" id="score-text">10 / 10</div>
                <div id="medal-notification"></div>
                <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem;">
                    <button class="btn secondary" onclick="startQuiz()" style="color: #ccc; border-color: #666;">↻ もう一度訓練する</button>
                    <a href="mypage.html" class="btn primary" style="background: #b366ff; color: #fff; border: none;">マイページを確認</a>
                </div>
            </div>

            <h3 style="color: #fff; margin-bottom: 1rem;">振り返り</h3>
            <div class="review-list" id="review-list"></div>
        </div>
    </main>

    <script src="./js/fake_news_quiz.js"></script>
</body>
</html>
