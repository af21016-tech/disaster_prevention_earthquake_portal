<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>デマ・誤情報 見極め訓練 | Quake Interactive Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Biz+UDPGOthic:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    
    <style>
        .quiz-container { max-width: 600px; margin: 100px auto 2rem; padding: 2rem; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .smartphone-ui { background: #000; border: 2px solid #333; border-radius: 20px; padding: 20px; margin-bottom: 20px; position: relative; }
        .post-box { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        .post-header { display: flex; align-items: center; margin-bottom: 10px; }
        .post-icon { width: 40px; height: 40px; background: #555; border-radius: 50%; margin-right: 10px; }
        .post-name { font-weight: bold; color: #fff; font-size: 0.9rem; }
        .post-id { color: #888; font-size: 0.8rem; margin-left: 5px; }
        .post-content { color: #eaeaea; font-size: 0.95rem; line-height: 1.5; }
        .post-image { width: 100%; height: 150px; background: #333; border-radius: 8px; margin-top: 10px; display: flex; align-items: center; justify-content: center; color: #888; }
        
        .action-area { display: flex; gap: 10px; margin-top: 20px; }
        .action-area button { flex: 1; padding: 12px; font-weight: bold; letter-spacing: 0.1em; }
        
        .feedback-area { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .feedback-area.correct { background: rgba(0, 230, 118, 0.1); border: 1px solid var(--cud-green); color: var(--cud-green); }
        .feedback-area.incorrect { background: rgba(255, 123, 0, 0.1); border: 1px solid var(--cud-orange); color: var(--cud-orange); }
        
        .progress-bar { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cud-purple); width: 0%; transition: 0.3s; }
        
        .result-box { text-align: center; display: none; }
        .score-display { font-size: 3rem; font-family: var(--font-mono); color: var(--cud-purple); margin: 20px 0; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <span class="tag" style="background: #b366ff; color: #000; font-weight: bold; margin-bottom: 4px; display: inline-block;">Infodemic Training</span>
            <h1 style="font-size: 1rem; margin: 0; letter-spacing: 0.1em;">デマ・誤情報 見極め訓練</h1>
        </div>
        <div class="header-actions">
            <a href="index.html" class="btn-back" data-log="デマ見極め：戻るボタンをクリック">✕ 戻る</a>
        </div>
    </header>

    <main class="quiz-container">
        
        <div id="start-screen" style="text-align: center; padding: 2rem 0;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">📱</div>
            <h2 style="color: #fff; margin-bottom: 1rem;">情報を拡散しますか？</h2>
            <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 2rem;">災害発生直後のSNSタイムライン。<br>次々と流れてくる情報の真偽を見極め、<br>インフォデミック（デマの拡散）を防いでください。</p>
            <button class="btn secondary" id="btn-start" data-log="デマ見極め：訓練を開始するボタンをクリック">訓練を開始する</button>
        </div>

        <div id="quiz-screen" style="display: none;">
            <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            <div style="text-align: right; font-size: 0.8rem; color: #888; margin-bottom: 10px;" id="q-counter">Q. 1 / 5</div>
            
            <div class="smartphone-ui">
                <div class="post-box">
                    <div class="post-header">
                        <div class="post-icon"></div>
                        <div>
                            <span class="post-name" id="p-name">名前</span><span class="post-id" id="p-id">@id</span>
                        </div>
                    </div>
                    <div class="post-content" id="p-text">投稿内容</div>
                    <div class="post-image" id="p-img" style="display:none;">画像添付</div>
                </div>
            </div>

            <div class="action-area" id="action-btns">
                <button class="btn secondary" id="btn-share" style="color: #ff7b00; border-color: #ff7b00;" data-log="デマ見極め：拡散するボタンをクリック">拡散する (Share)</button>
                <button class="btn primary" id="btn-ignore" data-log="デマ見極め：拡散しないボタンをクリック">拡散しない (Ignore)</button>
            </div>

            <div class="feedback-area" id="feedback">
                <h3 id="fb-title" style="margin-top:0; margin-bottom:10px;"></h3>
                <p id="fb-desc" style="font-size:0.9rem; line-height:1.5; color:#eaeaea;"></p>
                <div style="text-align:right; margin-top:15px;">
                    <button class="btn primary" id="btn-next" data-log="デマ見極め：次の情報へボタンをクリック">次の情報へ</button>
                    <button class="btn primary" id="btn-finish" style="display:none;" data-log="デマ見極め：結果を見るボタンをクリック">結果を見る</button>
                </div>
            </div>
        </div>

        <div id="result-screen" class="result-box">
            <h2 style="color: #fff;">訓練完了</h2>
            <div class="score-display" id="final-score">0 / 0</div>
            <p id="result-message" style="color: #aaa; margin-bottom: 2rem;"></p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <a href="index.html" class="btn secondary" data-log="デマ見極め：ダッシュボードへ戻るリンクをクリック">ダッシュボードへ戻る</a>
                <button class="btn primary" id="btn-retry" data-log="デマ見極め：もう一度挑戦するボタンをクリック">もう一度挑戦する</button>
            </div>
        </div>

    </main>

    <script src="./js/logger.js"></script>
    <script src="./js/fake_news_quiz.js"></script>
</body>
</html>
