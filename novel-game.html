<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3.11 記憶の追体験 | Quake Interactive Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Biz+UDPGOthic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    
    <style>
        body { background-color: #000; color: #fff; overflow: hidden; }
        .game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; }
        .bg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 1; transition: background-image 1s ease-in-out; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2; }
        
        .message-box { position: relative; z-index: 10; background: rgba(15, 15, 15, 0.9); border: 1px solid #333; border-radius: 8px; margin: 0 2rem 2rem 2rem; padding: 2rem; min-height: 150px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .speaker-name { font-weight: bold; color: var(--cud-blue); margin-bottom: 10px; font-size: 1.1rem; letter-spacing: 0.1em; }
        .message-text { font-size: 1.1rem; line-height: 1.8; letter-spacing: 0.05em; }
        
        .choice-container { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 20; display: flex; flex-direction: column; gap: 15px; width: 80%; max-width: 600px; display: none; }
        .choice-btn { background: rgba(15, 15, 15, 0.95); border: 1px solid var(--cud-orange); color: var(--cud-orange); padding: 15px 20px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; transition: 0.3s; text-align: left; }
        .choice-btn:hover { background: var(--cud-orange); color: #000; }
        
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: #050505; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body>

    <header style="background: transparent; border: none; z-index: 50;">
        <div class="logo-area"></div>
        <div class="header-actions">
            <a href="index.html" class="btn-back" data-log="ノベルゲーム：戻るボタンをクリック">✕ 戻る</a>
        </div>
    </header>

    <div id="start-screen">
        <h1 style="font-size: 2.5rem; letter-spacing: 0.2em; margin-bottom: 2rem; color: #fff;">3.11<br>記憶の追体験</h1>
        <p style="color: #aaa; margin-bottom: 3rem; line-height: 1.8;">あの時、あなたならどう動いたか。<br>生存本能と愛他性が交錯する、インタラクティブ・ノベル。</p>
        <button class="btn primary" id="btn-start" style="font-size: 1.2rem; padding: 15px 30px;" data-log="ノベルゲーム：物語を開始するボタンをクリック">物語を開始する</button>
    </div>

    <div class="game-container" id="game-ui" style="display: none;">
        <div class="bg-layer" id="bg-image" style="background-color: #222;"></div>
        <div class="overlay"></div>
        
        <div class="choice-container" id="choices">
            <button class="btn secondary choice-btn" id="choice-1" data-log="ノベルゲーム：選択肢1をクリック">選択肢1</button>
            <button class="btn secondary choice-btn" id="choice-2" data-log="ノベルゲーム：選択肢2をクリック">選択肢2</button>
        </div>

        <div class="message-box" id="msg-box">
            <div class="speaker-name" id="speaker"></div>
            <div class="message-text" id="message"></div>
            <div style="text-align: right; margin-top: 15px;">
                <button class="btn primary" id="btn-next" data-log="ノベルゲーム：次へボタンをクリック">次へ</button>
            </div>
        </div>
        
        <div id="result-box" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; text-align: center;">
            <h2 style="color: #00E676; font-size: 2rem; margin-bottom: 1rem;">SCENARIO CLEARED</h2>
            <p id="ending-text" style="color: #fff; margin-bottom: 2rem; line-height: 1.8;"></p>
            <a href="index.html" class="btn secondary" data-log="ノベルゲーム：ダッシュボードへ戻るリンクをクリック">ダッシュボードへ戻る</a>
        </div>
    </div>

    <script src="./js/logger.js"></script>
    <script src="./js/novel_game.js"></script>
</body>
</html>
