<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3.11 記憶の追体験 | Quake Interactive Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Biz+UDPGOthic:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100dvh; background-color: #000; color: #fff; overflow: hidden; font-family: 'Noto Serif JP', serif; }
        
        .game-header { position: absolute; top: 0; left: 0; width: 100%; padding: 1rem 2rem; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); display: flex; justify-content: space-between; align-items: center; z-index: 100; box-sizing: border-box; }
        
        /* ゲーム画面全体（背景色がシナリオに応じて変わる） */
        .game-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; transition: background-color 2s ease, background-image 2s ease; background-color: #111; background-size: cover; background-position: center; }

        /* テキストウィンドウ */
        .text-window { width: 90%; max-width: 800px; height: 250px; background: rgba(0, 0, 0, 0.75); border: 1px solid #444; border-radius: 8px; padding: 2rem; margin-bottom: 2rem; box-sizing: border-box; position: relative; cursor: pointer; backdrop-filter: blur(4px); }
        
        .message-text { font-size: 1.15rem; line-height: 1.8; letter-spacing: 1px; }
        
        /* クリック待ちアイコン */
        .click-indicator { position: absolute; bottom: 15px; right: 20px; font-size: 1.2rem; animation: blink 1s infinite; display: none; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        /* 選択肢エリア */
        .choices-container { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 700px; display: flex; flex-direction: column; gap: 1rem; z-index: 50; }
        .choice-btn { background: rgba(20, 20, 20, 0.9); border: 1px solid #666; color: #fff; padding: 1.2rem; font-size: 1.05rem; text-align: left; cursor: pointer; border-radius: 4px; transition: all 0.2s; font-family: 'Biz UDPGOthic', sans-serif; line-height: 1.5; }
        .choice-btn:hover { background: rgba(86, 180, 233, 0.3); border-color: #56B4E9; transform: translateX(5px); }

        /* リザルト画面 */
        .result-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 200; display: none; flex-direction: column; align-items: center; padding: 4rem 2rem; box-sizing: border-box; overflow-y: auto; font-family: 'Biz UDPGOthic', sans-serif; }
        .result-card { background: #1a1a1a; border: 1px solid #444; border-radius: 8px; padding: 2.5rem; max-width: 800px; width: 100%; text-align: center; }
        .radar-chart-container { width: 100%; max-width: 400px; margin: 2rem auto; }
        .feedback-text { text-align: left; font-size: 0.95rem; line-height: 1.6; color: #ccc; background: #000; padding: 1.5rem; border-left: 4px solid #56B4E9; border-radius: 4px; margin-top: 1.5rem; }
    </style>
</head>
<body>

    <header class="game-header">
        <h1 style="font-size: 1.1rem; margin: 0; font-family: 'Biz UDPGOthic', sans-serif; color: #aaa;">追体験シミュレーター</h1>
        <a href="index.html" class="btn secondary btn-small" style="font-family: 'Biz UDPGOthic', sans-serif; border-color: #555; color: #ccc;">✕ 中断して戻る</a>
    </header>

    <main class="game-container" id="game-container">
        
        <div id="snow-container" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; overflow: hidden;"></div>

        <div class="choices-container" id="choices-container"></div>

        <div class="text-window" id="text-window">
            <div class="message-text" id="message-text"></div>
            <div class="click-indicator" id="click-indicator">▼</div>
        </div>

    </main>

    <div class="result-screen" id="result-screen">
        <div class="result-card">
            <h2 style="color: #fff; margin-top: 0;">行動分析レポート</h2>
            <p style="color: #aaa; font-size: 0.9rem;">極限状態でのあなたの「愛他性」と「生存選択」の記録です。</p>
            
            <div id="feedback-area"></div>
            
            <div id="medal-notification" style="margin-top: 2rem; padding-top: 2rem; border-top: 1px dashed #444;"></div>
            
            <a href="index.html" class="btn primary" style="margin-top: 2rem; padding: 1rem 3rem; font-size: 1.1rem;">ダッシュボードへ帰還する</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./js/novel_game.js"></script>
</body>
</html>
