<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>過去の巨大地震 震度分布 | Quake Interactive Archive</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Biz+UDPGOthic:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./css/style.css">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100dvh; overflow: hidden; background-color: #050505; }
        
        /* ★修正：margin計算を廃止し、絶対配置で画面内に完全に収める */
        .dashboard-main { 
            position: absolute;
            top: 70px; /* ヘッダーの高さ */
            bottom: 0; /* 下にピタリと合わせる */
            left: 0;
            right: 0;
            display: flex; 
        }

        /* 左側リストパネル（PC基本設定） */
        .eq-list-panel {
            width: 350px;
            background: #111;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            z-index: 10;
        }

        /* マップエリア */
        .map-area { flex: 1; position: relative; }
        #intensity-map { width: 100%; height: 100%; }

        /* リストアイテムのスタイル */
        .eq-card {
            padding: 1.2rem;
            border-bottom: 1px solid #222;
            cursor: pointer;
            transition: 0.2s;
        }
        .eq-card:hover { background: #1a1a1a; }
        .eq-card.active { border-left: 4px solid #56B4E9; background: #1a1a1a; }
        .eq-date { font-family: 'Roboto Mono'; font-size: 0.8rem; color: #888; }
        .eq-name { font-weight: bold; margin: 4px 0; color: #eee; }

        /* 凡例 */
        .intensity-legend {
            background: rgba(15, 15, 15, 0.9);
            padding: 10px;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
        }
        .legend-row { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; margin-bottom: 3px; }
        .legend-color { width: 14px; height: 14px; border-radius: 2px; }

        /* ★スマートフォン向けレスポンシブ設定 */
        @media screen and (max-width: 768px) {
            .dashboard-main {
                flex-direction: column; 
            }
            .map-area {
                order: 1; 
                flex: 0 0 50%; /* 地図を上半分に */
                width: 100%;
            }
            .eq-list-panel {
                order: 2; 
                width: 100%;
                flex: 0 0 50%; /* リストを下半分に */
                border-right: none;
                border-top: 2px solid #333;
                padding-bottom: 30px; /* ★スマホ下部のホームバーに隠れないよう余白を追加 */
            }
            #eq-info-overlay {
                max-width: 220px !important;
                padding: 10px !important;
                top: 10px !important;
                left: 10px !important;
            }
            #info-title {
                font-size: 1rem !important;
                margin-bottom: 5px !important;
            }
            #info-desc {
                font-size: 0.75rem !important;
                line-height: 1.4 !important;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <span class="tag" style="background: #56B4E9; color: #000; font-weight: bold; margin-bottom: 4px; display: inline-block;">Intensity Archive</span>
            <h1 style="font-size: 1rem; margin: 0; letter-spacing: 0.1em;">過去の巨大地震 震度分布</h1>
        </div>
        <div class="header-actions">
            <a href="index.html" class="btn-back" data-log="震度分布マップ：戻るボタンをクリック">✕ 戻る</a>
        </div>
    </header>

    <main class="dashboard-main">
        <div class="eq-list-panel" id="eq-list-container">
            </div>
        <div class="map-area">
            <div id="intensity-map"></div>
            <div id="eq-info-overlay" style="position: absolute; top: 20px; left: 20px; z-index: 1000; background: rgba(15, 15, 15, 0.85); border: 1px solid #333; padding: 1rem; border-radius: 8px; backdrop-filter: blur(5px); max-width: 300px; display: none;">
                <h2 id="info-title" style="margin: 0 0 10px 0; font-size: 1.2rem; color: #fff;"></h2>
                <p id="info-desc" style="margin: 0; font-size: 0.85rem; color: #ccc; line-height: 1.6;"></p>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./js/logger.js"></script>
    <script src="./js/intensity_map.js"></script>
</body>
</html>
