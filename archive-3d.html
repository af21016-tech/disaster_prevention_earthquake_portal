<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D震源分布アーカイブ | Quake Interactive Archive</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Biz+UDPGOthic:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; background-color: #050505; }
        
        /* 3Dマップ表示エリア */
        .dashboard-main { 
            flex: 1; 
            display: flex; 
            position: relative; 
            margin-top: 60px; /* ヘッダー分下げる */
        }
        #map-3d-full { width: 100%; height: 100%; }

        /* タイムスライサーUI（SFJ風に調整） */
        #time-slicer-ui {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1.5rem;
            z-index: 1000;
            backdrop-filter: blur(8px);
            display: none;
        }

        .slider-container { display: flex; align-items: center; gap: 15px; margin-bottom: 1rem; }
        input[type=range] { flex: 1; accent-color: #56B4E9; }

        .slicer-controls { display: flex; justify-content: center; gap: 10px; }
        .btn-slicer {
            background: transparent;
            border: 1px solid #555;
            color: #fff;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        .btn-slicer:hover { border-color: #fff; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <span class="tag" style="background: #00E676; color: #000; font-weight: bold; margin-bottom: 4px; display: inline-block;">3D Archive</span>
            <h1 style="font-size: 1rem; margin: 0; letter-spacing: 0.1em;">震源分布 3Dマップ</h1>
        </div>
        <div class="header-actions">
            <a href="index.html" class="btn-back">✕ 戻る</a>
        </div>
    </header>

    <main class="dashboard-main">
        <div id="map-3d-full"></div>
        
        <div id="time-slicer-ui">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span id="label-start" style="font-family: 'Roboto Mono'; color: #888;">1995年</span>
                <span id="label-current" style="font-family: 'Roboto Mono'; color: #56B4E9; font-weight: bold; font-size: 1.2rem;">全期間</span>
            </div>
            <div class="slider-container">
                <input type="range" id="time-slider" min="0" max="100" value="100">
            </div>
            <div class="slicer-controls">
                <button id="btn-play" class="btn-slicer">▶ 再生</button>
                <button id="btn-pause" class="btn-slicer" style="display:none;">⏸ 停止</button>
                <button id="btn-show-all" class="btn-slicer">全期間表示</button>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
