<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行動変容クイズ | Quake Interactive Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Biz+UDPGOthic:wght@400;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        body { background-color: var(--bg-color); min-height: 100dvh; display: flex; flex-direction: column; }
        .quiz-header { padding: 1rem 2rem; background: var(--surface-color); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        
        .quiz-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 2rem; max-width: 800px; margin: 0 auto; width: 100%; }
        
        .stage-indicator { font-family: var(--font-mono); color: var(--primary-color); font-weight: bold; margin-bottom: 1rem; font-size: 1.2rem; text-align: center; }
        
        /* クイズカードのUI */
        .quiz-card { background: var(--surface-color); padding: 2.5rem 2rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; text-align: center; border: 1px solid var(--border-color); }
        .quiz-question { font-size: 1.25rem; line-height: 1.6; margin-bottom: 2rem; color: var(--text-main); font-weight: bold; }
        
        /* タイマーのUI */
        .timer-container { width: 100%; background: rgba(0,0,0,0.05); height: 8px; border-radius: 4px; margin-bottom: 0.5rem; overflow: hidden; }
        .timer-bar { height: 100%; width: 100%; background: #009E73; transition: width 0.1s linear, background-color 0.3s; }
        .timer-text { text-align: right; font-family: var(--font-mono); font-size: 0.9rem; margin-bottom: 1.5rem; color: var(--text-sub); font-weight: bold; }

        /* マルバツボタン */
        .btn-group { display: flex; gap: 1rem; justify-content: center; }
        .btn-ans { flex: 1; padding: 1.5rem; font-size: 2rem; border-radius: 12px; border: 2px solid; cursor: pointer; transition: 0.2s; background: transparent; font-weight: bold; }
        .btn-ans.maru { color: #0072B2; border-color: #0072B2; }
        .btn-ans.maru:hover { background: rgba(0, 114, 178, 0.1); }
        .btn-ans.batsu { color: #D55E00; border-color: #D55E00; }
        .btn-ans.batsu:hover { background: rgba(213, 94, 0, 0.1); }

        /* 解説エリア（初期非表示） */
        .explanation-area { display: none; margin-top: 2rem; text-align: left; padding-top: 1.5rem; border-top: 1px dashed var(--border-color); }
        .result-mark { font-size: 2.5rem; font-weight: bold; text-align: center; margin-bottom: 1rem; }
        .result-correct { color: #0072B2; }
        .result-incorrect { color: #D55E00; }
        .btn-next { width: 100%; margin-top: 1.5rem; padding: 1rem; font-size: 1.1rem; }

        /* ★新規追加：リザルト（結果発表）画面のUI */
        .result-screen { display: none; width: 100%; }
        .score-board { background: var(--surface-color); padding: 2rem; border-radius: 16px; text-align: center; border: 1px solid var(--border-color); margin-bottom: 2rem; }
        .score-text { font-size: 3rem; font-family: var(--font-mono); font-weight: bold; color: var(--primary-color); margin: 1rem 0; }
        .medal-icon { font-size: 4rem; margin-bottom: 0.5rem; }
        
        .review-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
        .review-item { background: var(--surface-color); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border-color); text-align: left; }
        .review-q { font-weight: bold; font-size: 1.1rem; margin-bottom: 1rem; color: var(--text-main); line-height: 1.5;}
        .review-ans { display: inline-block; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; margin-bottom: 0.5rem; }
        .review-ans.correct { background: rgba(0, 114, 178, 0.1); color: #0072B2; }
        .review-ans.incorrect { background: rgba(213, 94, 0, 0.1); color: #D55E00; }
        .review-exp { font-size: 0.9rem; color: var(--text-sub); line-height: 1.5; }
    </style>
</head>
<body>

    <header class="quiz-header">
        <h1 style="font-size: 1.2rem; margin: 0;">サバイバル・クイズ</h1>
        <a href="index.html" class="btn secondary btn-small">✕ やめる</a>
    </header>

    <main class="quiz-container">
        <div id="play-screen" style="width: 100%;">
            <div class="stage-indicator" id="stage-text">データを読み込み中...</div>
            <div class="quiz-card">
                <div class="timer-container">
                    <div id="timer-bar" class="timer-bar"></div>
                </div>
                <div id="timer-text" class="timer-text">残り: 10.0秒</div>

                <div class="quiz-question" id="question-text">
                    Loading...
                </div>
                
                <div class="btn-group" id="answer-buttons">
                    <button class="btn-ans maru" onclick="checkAnswer(true)">〇</button>
                    <button class="btn-ans batsu" onclick="checkAnswer(false)">✖</button>
                </div>

                <div class="explanation-area" id="explanation-area">
                    <div class="result-mark" id="result-mark">正解！</div>
                    <h4 style="margin: 0 0 0.5rem 0; color: var(--text-main);">解説</h4>
                    <p id="explanation-text" style="color: var(--text-sub); line-height: 1.5; font-size: 0.95rem;"></p>
                    <button class="btn primary btn-next" id="btn-next" onclick="nextQuestion()">次の問題へ</button>
                </div>
            </div>
        </div>

        <div id="result-screen" class="result-screen">
            <div class="score-board">
                <h2 style="color: var(--text-main); margin:0;">リザルト</h2>
                <div class="score-text" id="score-text">10 / 10</div>
                <div id="medal-notification">
                    </div>
                <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem;">
                    <button class="btn secondary" onclick="startStage(currentStageIndex)">↻ もう一度挑戦</button>
                    <button class="btn primary" id="btn-next-stage" style="display: none;" onclick="startStage(currentStageIndex + 1)">次のステージへ ➡</button>
                </div>
            </div>

            <h3 style="color: var(--text-main); margin-bottom: 1rem;">振り返り</h3>
            <div class="review-list" id="review-list">
                </div>
        </div>
    </main>

    <script src="./js/quiz.js"></script>
</body>
</html>
