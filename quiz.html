<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サバイバル・クイズ | Quake Interactive Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Biz+UDPGOthic:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    
    <style>
        .quiz-container { max-width: 800px; margin: 100px auto 2rem; padding: 2rem; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .progress-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--cud-orange); width: 0%; transition: width 0.3s ease; }
        
        .question-box { margin-bottom: 2rem; }
        .question-box h2 { color: #fff; font-size: 1.3rem; line-height: 1.6; letter-spacing: 0.05em; }
        
        .choices-box { display: flex; flex-direction: column; gap: 15px; }
        .choice-btn { text-align: left; padding: 1rem 1.5rem; font-size: 1rem; border-radius: 6px; background: #111; border: 1px solid #444; color: #eaeaea; cursor: pointer; transition: 0.2s; }
        .choice-btn:hover { background: #222; border-color: var(--cud-orange); }
        .choice-btn.selected { background: rgba(255, 123, 0, 0.1); border-color: var(--cud-orange); color: var(--cud-orange); }
        
        .feedback-box { margin-top: 2rem; padding: 1.5rem; border-radius: 8px; display: none; }
        .feedback-box.correct { background: rgba(0, 230, 118, 0.1); border: 1px solid var(--cud-green); }
        .feedback-box.incorrect { background: rgba(255, 123, 0, 0.1); border: 1px solid var(--cud-orange); }
        .feedback-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        .correct .feedback-title { color: var(--cud-green); }
        .incorrect .feedback-title { color: var(--cud-orange); }
        .feedback-desc { color: #eaeaea; font-size: 0.95rem; line-height: 1.6; }
        
        .result-box { text-align: center; display: none; }
        .score-display { font-size: 4rem; font-family: var(--font-mono); color: var(--cud-orange); margin: 20px 0; }
        .medal-icon { font-size: 3rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <span class="tag" style="background: #ff7b00; color: #000; font-weight: bold; margin-bottom: 4px; display: inline-block;">Survival Quiz</span>
            <h1 style="font-size: 1rem; margin: 0; letter-spacing: 0.1em;">サバイバル・クイズ</h1>
        </div>
        <div class="header-actions">
            <a href="index.html" class="btn-back" data-log="クイズ：戻るボタンをクリック">✕ 戻る</a>
        </div>
    </header>

    <main class="quiz-container">
        
        <div id="start-screen" style="text-align: center; padding: 2rem 0;">
            <h2 style="color: #fff; margin-bottom: 1rem; font-size: 1.5rem;">災害時の「常識」を疑え</h2>
            <p style="color: #aaa; margin-bottom: 2rem; line-height: 1.6;">過去の災害で多くの人が陥った「間違った判断」をベースにした実践的なクイズです。</p>
            
            <div style="display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto;">
                <button class="btn primary" id="btn-start-stage0" style="padding: 15px;" data-log="クイズ：初級を開始">🥉 初級（地震直後の行動・備え）<br><span style="font-size:0.85rem; font-weight:normal;">※まずはここから！</span></button>
                <button class="btn secondary" id="btn-start-stage1" style="padding: 15px;" data-log="クイズ：中級を開始">🥈 中級（複合・都市型災害）</button>
                <button class="btn secondary" id="btn-start-stage2" style="padding: 15px;" data-log="クイズ：上級を開始">🥇 上級（極限状態・情報）</button>
            </div>
        </div>

        <div id="quiz-screen" style="display: none;">
            <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; color: #888; font-family: var(--font-mono); font-size: 0.9rem;">
                <span id="q-counter">Q. 1 / 5</span>
                <span id="score-counter">Score: 0</span>
            </div>
            
            <div class="question-box">
                <h2 id="q-text">質問テキストがここに入ります。</h2>
            </div>
            
            <div class="choices-box" id="choices">
                <button class="choice-btn" id="choice-1" data-log="クイズ：選択肢1をクリック">選択肢1</button>
                <button class="choice-btn" id="choice-2" data-log="クイズ：選択肢2をクリック">選択肢2</button>
                <button class="choice-btn" id="choice-3" data-log="クイズ：選択肢3をクリック">選択肢3</button>
            </div>
            
            <div class="feedback-box" id="feedback">
                <div class="feedback-title" id="fb-title">正解 / 不正解</div>
                <div class="feedback-desc" id="fb-desc">解説テキストがここに入ります。</div>
                <div style="text-align: right; margin-top: 15px;">
                    <button class="btn primary" id="btn-next" data-log="クイズ：次の状況へボタンをクリック">次の状況へ</button>
                    <button class="btn primary" id="btn-finish" style="display:none;" data-log="クイズ：生存報告へボタンをクリック">生存報告（結果）へ</button>
                </div>
            </div>
        </div>

        <div id="result-screen" class="result-box">
            <h2 style="color: #fff; margin-bottom: 0;">訓練結果</h2>
            <div class="score-display" id="final-score">0 / 0</div>
            <div id="medal-container" style="display:none;">
                <div class="medal-icon" id="result-medal-icon">🥇</div>
                <p style="color: #F0E442; font-weight: bold; margin-bottom: 20px;">サバイバル・メダルを獲得しました！</p>
            </div>
            <p id="result-message" style="color: #aaa; margin-bottom: 2rem;"></p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <a href="index.html" class="btn secondary" data-log="クイズ：ダッシュボードへ戻るリンクをクリック">ダッシュボードへ戻る</a>
                <button class="btn primary" id="btn-retry" data-log="クイズ：もう一度挑戦するボタンをクリック">別の難易度に挑戦する</button>
            </div>
        </div>

    </main>

    <script src="./js/logger.js"></script>
    <script src="./js/quiz.js"></script>
</body>
</html>
